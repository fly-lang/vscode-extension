name: VSCode Extension

on:

  # Release is ONLY triggered manually from the Actions tab.
  # It reads the version from package.json, creates the tag, and publishes.
  workflow_dispatch:

jobs:

  # ── Build & package ──────────────────────────────────────────────────────
  # Runs on every push to main and on every manual dispatch.
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}
      vsix:    ${{ steps.meta.outputs.vsix }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Read version from package.json
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from package.json"
            exit 1
          fi
          echo "version=${VERSION}"              >> $GITHUB_OUTPUT
          echo "vsix=vscode-fly-${VERSION}.vsix" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Package (.vsix)
        run: npx vsce package --out vscode-fly-${{ steps.meta.outputs.version }}.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-fly-vsix
          path: ${{ steps.meta.outputs.vsix }}
          if-no-files-found: error

  # ── Tag + GitHub Release + Marketplace publish ───────────────────────────
  # Runs ONLY on manual workflow_dispatch.
  # Fails immediately if the tag for the current version already exists.
  release:
    needs: [build]
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create tag and GitHub Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git ls-remote sees all tags

      - name: Fail if tag already exists
        run: |
          VERSION=${{ needs.build.outputs.version }}
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" > /dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists. Bump the version in package.json before releasing."
            exit 1
          fi
          echo "Tag v${VERSION} is available — proceeding with release."

      - name: Create and push tag
        run: |
          VERSION=${{ needs.build.outputs.version }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - uses: actions/download-artifact@v4
        with:
          name: vscode-fly-vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: "Fly VSCode Extension v${{ needs.build.outputs.version }}"
          body: |
            ## Fly Language Support for VSCode — v${{ needs.build.outputs.version }}

            ### What's included
            - AUpdate lsp path

            ### Install
            Download `${{ needs.build.outputs.vsix }}` then run:
            ```
            code --install-extension ${{ needs.build.outputs.vsix }}
            ```
            or drag-and-drop the file into the VSCode Extensions panel.
          files: ${{ needs.build.outputs.vsix }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath ${{ needs.build.outputs.vsix }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
